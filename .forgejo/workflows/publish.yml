name: Publish Flatpak

# Builds vitals for x86_64 and aarch64 and publishes to the
# self-hosted OSTree-backed Flatpak repo at flatpak.rob.land on
# every push to main.
#
# Only runs on the selfhosted Forgejo at git.rob.land. The same
# workflow file ends up on Codeberg via the `origin` remote;
# without this guard it would queue indefinitely against
# codeberg-{tiny,small,medium} runners.
#
# Secrets required on the selfhosted Forgejo (Settings → Secrets):
#
#   FLATPAK_GPG_PRIVATE_KEY   base64 of `gpg --export-secret-keys --armor <KEY_ID>`
#   FLATPAK_GPG_KEY_ID        the short-or-long key id used to sign the repo
#   DEPLOY_SSH_PRIVATE_KEY    base64 of an SSH private key authorised for the deploy account
#   DEPLOY_KNOWN_HOSTS        contents of `ssh-keyscan <flatpak-repo-host>`
#   DEPLOY_TARGET             rsync target, e.g.
#                             `deploy-user@repo-host:/path/to/flatpak-repo/web/repo`

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    if: startsWith(github.server_url, 'https://git.rob.land')
    container:
      image: flatpak-builder-base:gnome50
      # Persistent cross-job flatpak runtime cache. First run populates;
      # subsequent runs treat `flatpak install` as a near-no-op.
      volumes:
        - /var/lib/docker/runtime-cache:/root/.local/share/flatpak

    env:
      APP_ID: land.rob.vitals
      MANIFEST: build-aux/flatpak/land.rob.vitals.json
      RUNTIME_VERSION: "50"
      LOCAL_REPO: /tmp/local-repo

    steps:
      - uses: actions/checkout@v4


      - name: Add flathub remote
        run: |
          flatpak remote-add --if-not-exists --user flathub \
            https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.FLATPAK_GPG_PRIVATE_KEY }}
        run: |
          mkdir -p "$HOME/.gnupg" && chmod 700 "$HOME/.gnupg"
          printf '%s' "$GPG_PRIVATE_KEY" > /tmp/k.asc
          echo "key bytes: $(wc -c </tmp/k.asc), first line: $(head -1 /tmp/k.asc)"
          gpg --batch --import /tmp/k.asc
          rm /tmp/k.asc
          gpg --list-secret-keys

      - name: Set up SSH for the deploy account
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          KNOWN_HOSTS:    ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          mkdir -p "$HOME/.ssh" && chmod 700 "$HOME/.ssh"
          printf '%s' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 644 "$HOME/.ssh/known_hosts"

      - name: Pull existing repo state from server
        env:
          DEPLOY_TARGET: ${{ secrets.DEPLOY_TARGET }}
        run: |
          mkdir -p "$LOCAL_REPO"
          rsync -avz --partial -e "ssh -i $HOME/.ssh/id_ed25519" \
            "$DEPLOY_TARGET/" "$LOCAL_REPO/" || true
          if [ ! -f "$LOCAL_REPO/config" ]; then
            echo "::notice::No remote repo state found — initialising a fresh archive repo locally"
            ostree --repo="$LOCAL_REPO" init --mode=archive
            exit 0
          fi

          # Drop refs whose backing commit object isn't present locally.
          # rsync can leave the destination in this state when an earlier
          # transfer was interrupted (we tolerate partial pulls with
          # `|| true` above), and `flatpak build-export` then aborts
          # with "No such metadata object <hash>.commit" because it
          # can't resolve the previous commit to use as the new export's
          # parent.
          broken=0
          while read -r ref; do
            [ -z "$ref" ] && continue
            if ! ostree --repo="$LOCAL_REPO" show "$ref" >/dev/null 2>&1; then
              echo "::warning::Dropping broken ref $ref (commit object missing locally)"
              ostree --repo="$LOCAL_REPO" refs --delete "$ref" || true
              broken=$((broken + 1))
            fi
          done < <(ostree --repo="$LOCAL_REPO" refs 2>/dev/null || true)
          if [ "$broken" -gt 0 ]; then
            echo "::warning::Cleared $broken broken ref(s); the export step will re-create them"
            # Remove the now-stale summary so build-update-repo regenerates
            # it against the surviving ref set.
            rm -f "$LOCAL_REPO/summary" "$LOCAL_REPO/summary.sig"
          fi

      - name: Register qemu binfmt for cross-arch builds
        run: |
          # Mount this container's own binfmt_misc filesystem then write
          # qemu-aarch64 registration directly to /register. The `F` flag
          # is "fix-binary" — kernel reads qemu-aarch64-static once into
          # its own memory so the registration survives bind-mount churn.
          mount -t binfmt_misc binfmt_misc /proc/sys/fs/binfmt_misc 2>/dev/null || true
          if ! grep -q '^enabled' /proc/sys/fs/binfmt_misc/qemu-aarch64 2>/dev/null; then
            printf '%s\n' ':qemu-aarch64:M::\x7fELF\x02\x01\x01\x00\x00\x00\x00\x00\x00\x00\x00\x00\x02\x00\xb7\x00:\xff\xff\xff\xff\xff\xff\xff\xfc\xff\xff\xff\xff\xff\xff\xff\xff\xfe\xff\xff\xff:/usr/bin/qemu-aarch64-static:OCF' > /proc/sys/fs/binfmt_misc/register
          fi
          echo "binfmt entries: $(ls /proc/sys/fs/binfmt_misc/)"
          grep -h '^enabled\|^interpreter' /proc/sys/fs/binfmt_misc/qemu-aarch64 || true

      - name: Install GNOME runtime + SDK for both arches
        run: |
          flatpak install --user --noninteractive --arch=x86_64 flathub \
            org.gnome.Platform//${RUNTIME_VERSION} \
            org.gnome.Sdk//${RUNTIME_VERSION}
          flatpak install --user --noninteractive --arch=aarch64 flathub \
            org.gnome.Platform//${RUNTIME_VERSION} \
            org.gnome.Sdk//${RUNTIME_VERSION}

      - name: Build flatpak (x86_64)
        run: |
          flatpak-builder --user --arch=x86_64 --force-clean --disable-rofiles-fuse \
            _flatpak_x86_64 "$MANIFEST"

      - name: Build flatpak (aarch64)
        run: |
          flatpak-builder --user --arch=aarch64 --force-clean --disable-rofiles-fuse \
            _flatpak_aarch64 "$MANIFEST"

      - name: Export both arches into the local repo, signed
        env:
          GPG_KEY_ID: ${{ secrets.FLATPAK_GPG_KEY_ID }}
        run: |
          flatpak build-export --arch=x86_64 \
            --gpg-sign="$GPG_KEY_ID" \
            "$LOCAL_REPO" _flatpak_x86_64
          flatpak build-export --arch=aarch64 \
            --gpg-sign="$GPG_KEY_ID" \
            "$LOCAL_REPO" _flatpak_aarch64

      - name: Regenerate + sign repo summary
        env:
          GPG_KEY_ID: ${{ secrets.FLATPAK_GPG_KEY_ID }}
        run: |
          flatpak build-update-repo \
            --gpg-sign="$GPG_KEY_ID" \
            --generate-static-deltas \
            "$LOCAL_REPO"

      - name: Push updated repo back to the server
        env:
          DEPLOY_TARGET: ${{ secrets.DEPLOY_TARGET }}
        run: |
          rsync -avz -e "ssh -i $HOME/.ssh/id_ed25519" \
            "$LOCAL_REPO/" "$DEPLOY_TARGET/"

      - name: Print remote-add hint
        run: |
          echo "::notice::Devices can install with: flatpak remote-add --user --if-not-exists rob-land https://flatpak.rob.land/rob-land.flatpakrepo && flatpak install --user rob-land $APP_ID"
